<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CCTV Dashboard</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  h1 {
    font-size: 2em;
    color: #333;
  }

  .dashboard-container {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .camera-box {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: center;
  }

  #cam {
    width: 640px;
    max-width: 100%;
    border: 2px solid #ccc;
    border-radius: 4px;
  }

  /* Optional: Add a refresh button for manual refresh */
  .refresh-btn {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 1em;
    cursor: pointer;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 4px;
    transition: background-color 0.3s;
  }

  .refresh-btn:hover {
    background-color: #0056b3;
  }
</style>
</head>
<body>
<header>
  <h1>Live Camera Feed</h1>
</header>
<div class="dashboard-container">
  <div class="camera-box">
    <img id="cam" src="" alt="Camera Feed" />
    <!-- Optional manual refresh button -->
    <!-- <button class="refresh-btn" onclick="refresh()">Refresh</button> -->
  </div>
</div>
<script>
  function refresh() {
    document.getElementById('cam').src =
      'http://192.168.1.10/snapshot.jpg?t=' + Date.now();
  }
  setInterval(refresh, 1000);
  refresh();
</script>
</body>
</html>
